{% extends "base.html" %}
{% block title %}List{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<table border="1">
  <thead>
    <tr>
      {% for h in headers %}
        <th>{{ h }}</th>
      {% endfor %}
    </tr>
  </thead>
  <tbody>
    {% for row in rows %}
      <tr>
        {% for cell in row %}
          <td>{{ cell|safe }}</td>
        {% endfor %}
      </tr>
    {% empty %}
      <tr><td colspan="{{ headers|length }}">No data.</td></tr>
    {% endfor %}
  </tbody>
</table>
<a href="{% url 'users:reader_dashboard' %}">Back to dashboard</a>
{% endblock %}
