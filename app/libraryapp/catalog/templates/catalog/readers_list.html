{% extends "base.html" %}
{% block title %}Readers{% endblock %}
{% block content %}
<h1>Readers</h1>
<a href="{% url 'catalog:reader_add' %}">Add reader</a>
<table border="1">
  <tr><th>Card&nbsp;#</th><th>Username</th></tr>
  {% for r in readers %}
    <tr>
      <td>{{ r.card_number }}</td>
      <td>{{ r.user.username }}</td>
    </tr>
  {% empty %}
    <tr><td colspan="2">No readers yet.</td></tr>
  {% endfor %}
</table>
{% endblock %}
